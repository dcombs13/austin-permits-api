services:
  - type: web
    name: firstnail-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: HUNTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_COMPANY
        sync: false

  - type: worker
    name: firstnail-monitor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node monitor.js
    envVars:
      - key: HUNTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MONITOR_PERMIT_TYPES
        value: BP,BC
      - key: MONITOR_LOOKBACK_HOURS
        value: "48"
      - key: MIN_RELEVANCE_SCORE
        value: "4"
